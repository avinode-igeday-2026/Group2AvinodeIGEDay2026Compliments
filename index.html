</textarea> 
        <h2> 𝒴𝑜𝓊𝓇 𝓈𝓊𝑔𝑔𝑒𝓈𝓉𝒾𝑜𝓃𝓈 𝒻𝑜𝓇 𝒸𝑜𝓂𝓅𝓁𝒾𝓂𝑒𝓃𝓉𝓈!</h2>
        
        <button onclick="showCompliment()">Give Me a Compliment! 💜</button>
    <script src="script.js"></script>
</body>
</html>
